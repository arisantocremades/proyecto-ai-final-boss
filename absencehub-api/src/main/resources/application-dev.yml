spring:
  datasource:
    url: jdbc:h2:mem:absencehub_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
  sql:
    init:
      encoding: UTF-8
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.absencehub: DEBUG
    org.springframework.security: DEBUG
