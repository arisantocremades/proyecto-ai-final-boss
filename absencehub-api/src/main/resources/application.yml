spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/absencehub}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
    serialization:
      write-dates-as-timestamps: false
      write-enums-using-to-string: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:bXktc2VjcmV0LWtleS1mb3ItYWJzZW5jZWh1Yi1hcGktMjAyNS1taW5pbXVtLTI1Ni1iaXRz}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
